<!DOCTYPE html>
<html>
<head>
<title>Bro Gang Login</title>
<style>
body{background:#050816;color:white;font-family:system-ui;text-align:center;margin-top:100px;}
input{display:block;margin:10px auto;padding:10px;width:250px;}
button{padding:10px 20px;background:#ff0055;color:white;border:none;}
</style>
</head>
<body>

<h1>Bro Gang 🔥</h1>

<form action="/login" method="POST">
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
</form>

<h2>Register</h2>

<form action="/register" method="POST">
    <input name="email" placeholder="Email" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Register</button>
</form>

</body>
</html>
